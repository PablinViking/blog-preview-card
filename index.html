<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  <main class="card">
    <div class="card__image-container">
      <img class="card__image" src="assets/images/illustration-article.svg" alt="illustration article">
    </div>

    <section class="card__info-card">
      <p class="info-card__p01">Learning</p>
      <p class="info-card__p02">Published 21 Dec 2023</p>
      <h1 class="info-card__h1">HTML & CSS foundations</h1>
      <p class="info-card__p03">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </section>

    <section class="card__info-user">
      <img class="info-user__avatar" src="assets/images/image-avatar.webp" alt="user image">
      <p class="info-user__name">Greg Hooper</p>
    </section>
  </main>
  
  <footer class="footer">
    <p class="footer__p">
      Challenge by <a class="footer__a" href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a class="footer__a" href="#">Pablo Boichenko</a>.
    </p>
  </footer>
</body>
</html>
